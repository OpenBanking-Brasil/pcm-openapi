        timestamp:
          description: Data/Hora UTC no formato ISO8601 com milissegundos (YYYY-MM-DDTHH:mm:ss.sssZ) do momento em que a chamada foi disparada, imediatamente antes do primeiro byte enviado na requisiĂ§ĂŁo.
          type: string
          format: date-time
          maxLength: 28
          example: "2021-11-11T18:08:08.278Z"
        processTimespan:
          description: Tempo em milissegundos inteiros decorrido desde o registro do timestamp atĂ© a chegada do primeiro byte da resposta do server.
          type: integer
          format: int16
          example: 120
        clientSSId:
          description: Identificador do software statement de onde a chamada foi disparada. A PCM garante que foi esta orgId que obteve o token de acesso utilizado neste reporte.
          type: string
          format: uuid
          maxLength: 36
          pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"
          example: "84570da9-567b-4201-9b77-c715bc5bffde"
        clientOrgId:
          description: Identificador da organizaĂ§ĂŁo **de onde** a chamada foi disparada
          type: string
          format: uuid
          maxLength: 36
          pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"
          example: "56411f7e-d58b-44a8-8a2b-ff326d3f2955"
        serverOrgId:
          description: Identificador da organizaĂ§ĂŁo **para onde** a chamada foi feita
          type: string
          format: uuid
          maxLength: 36
          pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"
          example: "c1ca8e62-9d6f-4ea3-84f2-d66bc0a8f7dc"
        endpointUriPrefix:
          description: |
            EndereĂ§o do servidor de destino da chamada, incluindo o prefixo quando houver. O formato do campo deverĂĄ ser o seguinte: `https://{host}/{prefixo}`, sendo:

            * `host`: endereĂ§o FQDN do servidor de destino
            * `prefixo`: toda a parte do path que vem antes da string `/open-banking`

            Exemplos:

            1. Para uma requisiĂ§ĂŁo em `https://openbanking.instituicao-1.com.br/opbk/open-banking/products-services/v1/business-accounts`, o dado a ser enviado Ă© `https://openbanking.instituicao-1.com.br/opbk`.
            1. Para uma requisiĂ§ĂŁo em `https://openbanking.instituicao-2.com.br/open-banking/products-services/v1/business-accounts`, o dado a ser enviado Ă© `https://openbanking.instituicao-1.com.br/`.

            Nos reportes relativos aos endpoints /token e /register este campo deverĂĄ conter a URL inteira do request. 

            Exemplos: `https://oauth2.cartaodummy.opf.instituicao/as/token.oauth2` `https://instituicao.com.br/orgs/instituicao/reg`
          type: string
          pattern: ^[- /:_.',0-9a-zA-Z]{0,200}$
          maxLength: 200
          example: https://openbanking.instituicao-1.com.br/opbk
        role:
          description: ENUM indicando se o reporte que estĂĄ sendo enviado apresenta a visĂŁo do server ou do client. ObrigatĂłrio valor "CLIENT"
          type: string
          enum:
            - CLIENT
            - SERVER

