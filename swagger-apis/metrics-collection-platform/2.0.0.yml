openapi: 3.0.3
info:
  title: "Plataforma de Coleta de MĂ©tricas"
  description: |
    # IntroduĂ§ĂŁo

    A Plataforma de Coleta de MĂ©tricas foi idealizada para contabilizar as interaĂ§Ă”es entre as instituiĂ§Ă”es participantes, de modo a promover um ambiente equitativo e nĂŁo discriminatĂłrio. Se trata de uma Plataforma localizada no perĂ­metro central, gerida pelo regulador do ecossistema.

    ## MotivaĂ§ĂŁo

    Para que o ecossistema do Open Finance Brasil seja saudĂĄvel para instituiĂ§Ă”es e clientes finais, fez-se necessĂĄria a criaĂ§ĂŁo de uma Plataforma que deverĂĄ concentrar dados sobre as chamadas que as instituiĂ§Ă”es fazem umas Ă s outras. Dessa forma, permite-se coletar informaĂ§Ă”es visando criar mĂ©tricas e indicadores a fim de se ter visibilidade sobre todo o ambiente.

    No intuito de manter a integridade e consistĂȘncia nos dados, o envio destes pelas instituiĂ§Ă”es deverĂĄ passar por um processo de conciliaĂ§ĂŁo. Quando divergente, as instituiĂ§Ă”es serĂŁo notificadas e terĂŁo a possibilidade de ajustar os reportes, o que promove um ambiente saudĂĄvel de autorregulaĂ§ĂŁo, prevenindo assim uma disputa.

    ## O que a Plataforma nĂŁo Ă©

    A Plataforma recebe os dados de maneira pĂłstuma, ou seja, dentro do perĂ­odo de fechamento, mas apĂłs a chamada concreta ter sido feita. Dada essa natureza, a Plataforma nĂŁo pode atuar como um agente que proĂ­be, bloqueia ou interfere nas interaĂ§Ă”es entre as instituiĂ§Ă”es.

    Por mais que concentre informaĂ§Ă”es importantes das chamadas entre as instituiĂ§Ă”es, a Plataforma nĂŁo Ă© uma ferramenta de BI, e o controle de acesso aos dados Ă© feito em diferentes nĂ­veis (participante, regulador e administrador).

    ## Premissas TĂ©cnicas

    * Tanto o envio por parte dos participantes quanto o processamento por parte da Plataforma serĂŁo feitos de maneira assĂ­ncrona;

    ## Terminologia

    * **Server e Client**: em uma interaĂ§ĂŁo, a parte que solicita os dados Ă© chamada de _client_, ao passo que a parte que devolve os dados Ă© o _server_. O ponto de vista para o uso dessa terminologia Ă© o trĂĄfego dos dados da transaĂ§ĂŁo e nĂŁo o ponto de partida da chamada. Portanto, supondo que A faĂ§a uma consulta em B pelos dados de uma conta, esses dados vĂŁo ser transmitidos por quem recebeu a solicitaĂ§ĂŁo, e recebidos por quem a fez, nesse caso, "A" Ă© o Client e "B" Ă© o Server.

    * **Reporte**: no contexto da API de Coleta de MĂ©tricas, um _reporte_ Ă© o registro da chamada que serĂĄ enviado tanto pelo server quanto pelo client. Esse registro serĂĄ armazenado na Plataforma para posterior processo de conciliaĂ§ĂŁo de chamadas e extraĂ§ĂŁo de dados estatĂ­sticos.

    * **DivergĂȘncia**: Quando Server e Client enviam reportes, cada um destes reportes se refere a uma chamada em especĂ­fico. Nos casos em que uma das partes nĂŁo envia o reporte sobre essa chamada em especĂ­fico, Ă© caracterizada uma divergĂȘncia. As divergĂȘncias podem ser resolvidas pela chamada Ă s operaĂ§Ă”es de modificaĂ§ĂŁo de reportes em suas respectivas APIs. Uma divergĂȘncia Ă© considerada fechada apenas quando todos os reportes encontram sua respectiva correspondĂȘncia do outro lado da chamada.


    Para informaĂ§Ă”es detalhadas sobre a PCM, consulte o [site da documentaĂ§ĂŁo da Plataforma](https://openfinancebrasil.atlassian.net/wiki/spaces/OF/pages/17378055/Plataforma+de+Coleta+de+M+tricas).

