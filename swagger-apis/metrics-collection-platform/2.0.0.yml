            - PJ
        localInstrument:
          description: Deve ser preenchido com a mesma string informada no payload ".data.localInstrument"
          type: string
        status:
          description: Deve ser preenchido com a mesma string obtida no ".data.status"
          type: string
        clientIp:
          description: Deve ser preenchido com o EndereĂ§o IPv4 ou IPv6 do client que fez a requisiĂ§ĂŁo
          type: string
        rejectReason:
          description: Deve ser preenchido com a mesma string obtida no ".data.rejectionReason.code"
          type: string
        errorCodes:
          description: Caso o HTTP Code seja 4XX ou 5XX, esse campo deve ser preenchido com a lista das strings obtidas em ".errors[].code" . NĂŁo havendo string, deve ser enviada uma lista vazia.
          type: string
        webhookEnable:
          description: Deve ser preenchido com o valor booleano TRUE caso haja pelo menos um item indicado na lista do campo ".webhook_uris" no payload, caso contrĂĄrio deverĂĄ ser preenchido com o valor booleano FALSE
          type: string
        webhookInteractionId:
          description: Caso o GET esteja sendo feito apĂłs o estĂ­mulo do webhook, o x-webhook-interaction-id deverĂĄ ser indicado
          type: string
        enrollmentId:
          description: Deve ser preenchido com a mesma string obtida no campo `.data.enrollmentId` retornado apĂłs a chamada inicial na API "POST /enrollments". *Ao reportar o uso de um endpoint /token, o identificador Ășnico de consentimento sĂł serĂĄ reportado nos casos em que "grant_type" Ă© do tipo "authorization_code" ou do tipo "refresh_token", uma vez que esta informaĂ§ĂŁo de enrollmentId Ă© inexistente quando "grant_type" Ă© do tipo "client_credentials".
          type: string
        authenticatorAttachment:
          description: Deve ser preenchido com a mesma string definida em ".data.authenticatorAttachment".  NĂŁo havendo string, deve ser explicitamente enviada esse additionalInfo como sendo uma string vazia.
          type: string
        platform:
          description: Deve ser preenchido com a mesma string definida em ".data.platform"
          type: string
        rp:
          description: Deve ser preenchido com a mesma string definida em ".data.rp"
          type: string
