tags:
  - name: Private API
    description: |
      A Private API fornece operaĂ§Ă”es que permitem a inclusĂŁo dos reportes que representam transaĂ§Ă”es entre participantes do ecossistema do Open Finance.
  - name: Opendata API
    description: |
      A Opendata API fornece operaĂ§Ă”es que permitem a inclusĂŁo dos reportes cujas chamadas foram feitas nas API de dados abertos do Open Finance o qual nĂŁo sofrem processo de conciliaĂ§ĂŁo.
  - name: Hybrid Flow API
    description: |
      Oferece operaĂ§Ă”es que permitem a inclusĂŁo de reportes relativos Ă  jornada de autorizaĂ§ĂŁo de consentimento. Os reportes podem ser feitos atĂ© Ă s 08h00 de D+1 da data da ocorrĂȘncia e nĂŁo precisam ser enviados em ordem.

      [Ver diagrama de sequĂȘncia](https://github.com/OpenBanking-Brasil/specs-pcm/blob/feature/PCM-122/openapi/hybrid-flow-diagram.svg?raw=true)
      
      [Ver fluxograma de envio de reports](https://raw.githubusercontent.com/OpenBanking-Brasil/specs-pcm/feature/PCM-122/openapi/Diagrama%20API%20PCM%20Hybrid%20Flow_v3.drawio.svg)
  - name: "Consents API"
    description: |
      API dedicada para obtenĂ§ĂŁo de estoque de consentimento, Ă  partir do auto reporte das instituiĂ§Ă”es, com endpoint Ășnico para os papeis Client/Server.

paths:
  "/report-api/v1/private/report":
    post:
      tags:
        - Private API
      summary: InclusĂŁo de reportes
      description: |
        InclusĂŁo de reportes na plataforma. Ao enviar um lote de reportes, a plataforma vai fazer o processo de validaĂ§ĂŁo de cada reporte de maneira sĂ­ncrona e devolver o resultado dessa validaĂ§ĂŁo na resposta. O status HTTP de retorno serĂĄ 200 caso **todos** dos reportes enviados forem aceitos. Caso pelo menos 1 reporte esteja inconsistente, o status de retorno serĂĄ 207 - veja documentaĂ§ĂŁo de cada status de retorno para mais informaĂ§Ă”es. 

        Os dados inseridos na API de Reporte sĂŁo sempre processados de maneira assĂ­ncrona, e sua persistĂȘncia se utiliza de consistĂȘncia posterior (eventual consistency), portanto, um registro tem um tempo de processamento em que ele nĂŁo estarĂĄ disponĂ­vel para consulta atĂ© que ele seja persistido.

        O limite de reportes de cada envio de lote Ă© de 5.000 entradas no array.
      operationId: add-reports
      requestBody:
        content:
          application/json:
            schema:
              type: array
              maxItems: 5000
              items:
                oneOf:
                  - $ref: "#/components/schemas/ClientReportRequest"
                  - $ref: "#/components/schemas/ServerReportRequest"

            examples:
              "Request Valido":
                description: O request apresentado tem todos os campos validados.
                value:
                  - timestamp: "2021-11-11T18:08:08.894Z"
                    fapiInteractionId: "d78fc4e5-37ca-4da3-adf2-9b082bf92280"
                    clientSSId: "f0b5419b-2b5f-4f59-9862-6d2a8e23be26"
                    clientOrgId: "082ff90b-9d65-46bb-b123-b88eb47fd61c"
                    serverOrgId: "b8e34d5a-2ed5-451e-8ddb-45a1edc76243"
                    endpoint: "/open-banking/products-services/v1/business-financings"
                    statusCode: 200
                    httpMethod: GET
                    correlationId: "wNupARo7I9E2PLJZph18a0M9y7DcUe7ITt3DqUOJd9NVjnskxf"
                    processTimespan: 120
                    endpointUriPrefix: "https://ofin.bank.com/"
                    role: CLIENT
                    additionalInfo:
                      personType: "PF"
                      consentId: "uri:bank:d1541b17-3175-477d-a52b-2813ae2c4c36"
                  - timestamp: "2021-11-11T19:22:10.334Z"
                    fapiInteractionId: "0786fce3-a36f-43f8-b66a-d26ab1dfc639"
                    clientSSId: "f0b5419b-2b5f-4f59-9862-6d2a8e23be26"
                    clientOrgId: "082ff90b-9d65-46bb-b123-b88eb47fd61c"
                    serverOrgId: "b8e34d5a-2ed5-451e-8ddb-45a1edc76243"
                    endpoint: "/open-banking/products-services/v1/business-financings"
                    statusCode: 200
                    httpMethod: GET
                    correlationId: "8qPzRL4nBzesCc3H1827UlqqEuTT4F5lN82DuJllcnL5VnnY5j"
                    processTimespan: 117
                    endpointUriPrefix: "https://ofin.bank.com/"
                    role: CLIENT
                    additionalInfo:
                      personType: "PF"
                      consentId: "uri:bank:d1541b17-3175-477d-a52b-2813ae2c4c36"
                  - timestamp: "2021-11-11T19:41:41.811Z"
                    fapiInteractionId: "d1541b17-3175-477d-a52b-2813ae2c4c36"
                    clientOrgId: "082ff90b-9d65-46bb-b123-b88eb47fd61c"
                    serverOrgId: "b8e34d5a-2ed5-451e-8ddb-45a1edc76243"
                    endpoint: "/open-banking/products-services/v1/business-financings"
                    statusCode: 200
                    httpMethod: GET
                    processTimespan: 125
                    role: SERVER
        required: true
      responses:
        "200":
          description: |
            O status 200 representa a situaĂ§ĂŁo onde todos os registros enviados no lote foram validados e serĂŁo direcionados para processamento. Se pelo menos 1 registro contiver problemas de validaĂ§ĂŁo, o retorno serĂĄ 207 (veja descriĂ§ĂŁo do status).

            A operaĂ§ĂŁo vai devolver um array com todos os resultados, e garante que ele esteja na mesma ordem do array da requisiĂ§ĂŁo.
          content:
            application/json:
              schema:
                type: array
                maxItems: 5000
                items:
                  $ref: "#/components/schemas/ReportResponse"
              examples:
                Todos Processados:
                  description: Esta seria a resposta para uma solicitaĂ§ĂŁo com o exemplo "Request VĂĄlido" da documentaĂ§ĂŁo. O payload da resposta vem na mesma ordem do array da solicitaĂ§ĂŁo. Uma vez que todos os registros foram validados, o status de retorno Ă© o 200.
                  value:
                    - reportId: 424ad55c-36cc-4077-b85e-c22ea984cc4a
                      correlationId: wNupARo7I9E2PLJZph18a0M9y7DcUe7ITt3DqUOJd9NVjnskxf
                      status: ACCEPTED
                    - reportId: 4095388d-f44f-499a-a9a7-2dbffce1bb8a
                      correlationId: 8qPzRL4nBzesCc3H1827UlqqEuTT4F5lN82DuJllcnL5VnnY5j
                      status: ACCEPTED
                    - reportId: 0f3fcceb-39f6-41b4-a75d-8444244bd836
                      status: ACCEPTED

        "207":
          description: |
            O status 207 (Multi-Status) informa ao solicitante que o formato da requisiĂ§ĂŁo estĂĄ correto, mas que entradas do array contĂ©m erro de validaĂ§ĂŁo em pelo menos 1 item. Ou seja, se todos os elementos do array informado estiverem com falha de validaĂ§ĂŁo, a operaĂ§ĂŁo vai devolver o status 207, e no corpo da resposta todos os elementos do array vĂŁo estar com status `DISCARDED` e com sua respectiva mensagem. 

            A operaĂ§ĂŁo vai devolver um array com todos os resultados, e garante que ele esteja na mesma ordem do array da requisiĂ§ĂŁo.
          content:
            application/json:
              schema:
                type: array
                maxItems: 5000
                items:
                  $ref: "#/components/schemas/ReportResponse"
              examples:
                "Primeiro registro com falha":
                  description: |
                    No caso apresentado Ă© o resultado onde o exemplo "Request com falha" foi enviado: o registro com o _fapiInteractionId_ `d78fc4e5-37ca-4da3-adf2-9b082bf92280` apresentou uma falha na validaĂ§ĂŁo, mas os demais foram enviados para processamento. Como um dos registros nĂŁo foi validado, o status de retorno passa a ser 207, e os demais registros sĂŁo processados normalmente.
                  value:
                    - reportId: 424ad55c-36cc-4077-b85e-c22ea984cc4a
                      correlationId: wNupARo7I9E2PLJZph18a0M9y7DcUe7ITt3DqUOJd9NVjnskxf
                      status: DISCARDED
                      message: "Missing fields: 'fapiInteractionId'"
                    - reportId: 4095388d-f44f-499a-a9a7-2dbffce1bb8a
                      correlationId: 8qPzRL4nBzesCc3H1827UlqqEuTT4F5lN82DuJllcnL5VnnY5j
                      status: ACCEPTED
                    - reportId: 0f3fcceb-39f6-41b4-a75d-8444244bd836
                      status: ACCEPTED
                "Todos registros com falha":
                  description: |
                    Neste caso, parte-se da premissa que todos os registros foram enviados sem _correlationId_ e sem _uri_. Nesse caso, todos vĂŁo falhar na etapa de validaĂ§ĂŁo, mas mesmo quando todos os registros falham, o status de retorno Ă© o 207.
                  value:
                    - reportId: 424ad55c-36cc-4077-b85e-c22ea984cc4a
                      status: DISCARDED
                      message: "Missing fields: 'fapiInteractionId'"
                    - reportId: 4095388d-f44f-499a-a9a7-2dbffce1bb8a
                      status: DISCARDED
                      message: "Missing fields: 'fapiInteractionId'"
                    - reportId: 0f3fcceb-39f6-41b4-a75d-8444244bd836
                      status: DISCARDED
                      message: "Missing fields: 'fapiInteractionId'"
                "Campo obrigatĂłrio nĂŁo enviado":
                  description: |
                    Registro com campo obrigatĂłrio nĂŁo enviado.
                  value:
                    - reportId: 424ad55c-36cc-4077-b85e-c22ea984cc4a,
                      correlationId: wNupARo7I9E2PLJZph18a0M9y7DcUe7ITt3DqUOJd9NVjnskxf,
                      status: DISCARDED,
                      message: "Missing fields: 'statusCode'"

        "400":
          description: O formato do corpo da requisiĂ§ĂŁo nĂŁo Ă© um array.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericError"
              examples:
                "400":
                  value:
                    message: "Invalid payload format: MUST be an array"

        "413":
          description: A quantidade de registros enviado excede o limite da operaĂ§ĂŁo (5.000 elementos no array), ou o tamanho do payload excede 10Mb.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericError"
              examples:
