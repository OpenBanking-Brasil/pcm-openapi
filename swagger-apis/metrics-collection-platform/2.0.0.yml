        - Opendata API
      summary: InclusĂŁo de reportes
      description: |

        InclusĂŁo de reportes de dados abertos na plataforma. Ao enviar um lote de reportes, a plataforma vai fazer o processo de validaĂ§ĂŁo sintĂĄtica de cada reporte de maneira sĂ­ncrona e devolver o resultado dessa validaĂ§ĂŁo na resposta. O status HTTP de retorno serĂĄ 200 caso **todos** dos reportes enviados forem aceitos. Caso pelo menos 1 reporte esteja inconsistente, o status de retorno serĂĄ 207 - veja documentaĂ§ĂŁo de cada status de retorno para mais informaĂ§Ă”es. 

        Os dados inseridos na API de Reporte sĂŁo sempre processados de maneira assĂ­ncrona, e sua persistĂȘncia se utiliza de consistĂȘncia posterior (eventual consistency), portanto, um registro tem um tempo de processamento em que ele nĂŁo estarĂĄ disponĂ­vel para consulta atĂ© que ele seja persistido.

        O limite de registros de cada lote Ă© de 5.000 registros.
