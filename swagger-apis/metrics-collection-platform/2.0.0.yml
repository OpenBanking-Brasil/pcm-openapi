          example: "2020-07-21T08:30:00Z"
        rejectionReason:
          description: |
            Motivo de recusa do pedido de portabilidade.
              - SĂł serĂĄ preenchido caso o status seja `REJECTED`, `CANCELLED` ou `PAYMENT_ISSUE`
              - A consulta ao endpoint de GET Ă© requerida para o fluxo de portabilidade
          type: string
          enum:
            - CANCELADO_PELO_CLIENTE
            - SALDO_DEVEDOR_ATUALIZADO_SUBSTANCIALMENTE_DIVERGENTE
            - POLITICA_DE_CREDITO
            - RETENCAO_DO_CLIENTE
            - CONTRATO_JA_LIQUIDADO
            - DIVERGENCIA_DE_PAGAMENTO_EFETUADO
