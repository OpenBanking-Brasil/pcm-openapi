        "200":
          description: |
            O status 200 representa a situaĂ§ĂŁo onde todos os registros enviados no lote foram validados e serĂŁo direcionados para processamento. Se pelo menos 1 registro contiver problemas de validaĂ§ĂŁo, o retorno serĂĄ 207 (veja descriĂ§ĂŁo do status).

            A operaĂ§ĂŁo vai devolver um array com todos os resultados, e garante que ele esteja na mesma ordem do array da requisiĂ§ĂŁo.
          content:
            application/json:
              schema:
                type: array
                maxItems: 5000
                items:
                  $ref: "#/components/schemas/ReportResponse"
              examples:
                Todos Processados:
                  description: Esta seria a resposta para uma solicitaĂ§ĂŁo com o exemplo "Request VĂĄlido" da documentaĂ§ĂŁo. O payload da resposta vem na mesma ordem do array da solicitaĂ§ĂŁo. Todos registros que chegarem com o atributo _correlationId_ o receberĂŁo de volta. Uma vez que todos os registros foram validados, o status de retorno Ă© o 200.
                  value:
                    - reportId: 424ad55c-36cc-4077-b85e-c22ea984cc4a
                      status: ACCEPTED
                    - reportId: 4095388d-f44f-499a-a9a7-2dbffce1bb8a
                      status: ACCEPTED

        "207":
          description: |
            O status 207 (Multi-Status) informa ao solicitante que o formato da solicitaĂ§ĂŁo estĂĄ correto, mas que entradas do array da solicitaĂ§ĂŁo contĂ©m erro de validaĂ§ĂŁo em pelo menos uma entrada. Ou seja, se todos os elementos do array informado estiverem com falha de validaĂ§ĂŁo, a operaĂ§ĂŁo vai devolver o status 207, e no corpo da resposta todos os elementos do array vĂŁo estar com status `DISCARDED` e com sua respectiva mensagem. 

            A operaĂ§ĂŁo vai devolver um array com todos os resultados, e garante que ele esteja na mesma ordem do array da requisiĂ§ĂŁo.
          content:
            application/json:
              schema:
                type: array
                maxItems: 5000
                items:
                  $ref: "#/components/schemas/ReportResponse"
              examples:
                "Primeiro registro com falha":
                  description: |
                    No caso apresentado Ă© o resultado onde o exemplo "Request com falha" foi enviado: o registro com o _fapiInteractionId_ `d78fc4e5-37ca-4da3-adf2-9b082bf92280` apresentou uma falha na validaĂ§ĂŁo, mas os demais foram enviados para processamento. Como um dos registros nĂŁo foi validado, o status de retorno passa a ser 207, e os demais registros sĂŁo processados normalmente.
                  value:
                    - reportId: 424ad55c-36cc-4077-b85e-c22ea984cc4a
                      status: DISCARDED
                      message: "Missing fields: 'uri'"
                    - reportId: 4095388d-f44f-499a-a9a7-2dbffce1bb8a
                      status: ACCEPTED
                    - reportId: 0f3fcceb-39f6-41b4-a75d-8444244bd836
                      status: ACCEPTED
                "Todos registros com falha":
                  description: |
                    Neste caso, parte-se da premissa que todos os registros foram enviados com algum campo faltante. Nesse caso, todos vĂŁo falhar na etapa de validaĂ§ĂŁo, mas mesmo quando todos os registros falham, o status de retorno Ă© o 207.
                  value:
                    - reportId: 424ad55c-36cc-4077-b85e-c22ea984cc4a
                      status: DISCARDED
                      message: "Missing fields: 'uri'"
                    - reportId: 4095388d-f44f-499a-a9a7-2dbffce1bb8a
                      status: DISCARDED
                      message: "Missing fields: 'additionalInfo'"
                    - reportId: 0f3fcceb-39f6-41b4-a75d-8444244bd836
                      status: DISCARDED
                      message: "Missing fields: 'httpMethod'"

        "400":
          description: O formato do corpo da requisiĂ§ĂŁo nĂŁo Ă© um array.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericError"
