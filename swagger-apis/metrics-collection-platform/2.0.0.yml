      description: Representa os dados que deverĂŁo ser enviados para a inclusĂŁo de reportes pelo lado do Server (receptor da chamada). InformaĂ§Ă”es adicionais sobre cada campo podem ser encontradas na documentaĂ§ĂŁo funcional em [https://openfinancebrasil.atlassian.net/wiki/spaces/OF/pages/37879861/Reporte#Modelos-para-reportes-Private](https://openfinancebrasil.atlassian.net/wiki/spaces/OF/pages/37879861/Reporte#Modelos-para-reportes-Private)
      type: object
      required:
        - fapiInteractionId
        - endpoint
        - statusCode
        - httpMethod
        - timestamp
        - processTimespan
        - clientOrgId
        - serverOrgId
        - role
      properties:
        fapiInteractionId:
          description: UUID que identifica uma transaĂ§ĂŁo especĂ­fica entre dois participantes. Esse dado pode ser encontrado no header x-fapi-interaction-id que Ă© informado pelo Client e devolvido pelo Server. Mais informaĂ§Ă”es em [CabeĂ§alhos HTTP](https://openbanking-brasil.github.io/areadesenvolvedor/#cabecalhos-http) na documentaĂ§ĂŁo do Open Finance Brasil.
          type: string
          format: uuid
          maxLength: 36
          pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"
          example: "d78fc4e5-37ca-4da3-adf2-9b082bf92280"
        endpoint:
          $ref: "#/components/schemas/PrivateReportEndpoints"
        statusCode:
          description: Status de retorno HTTP da solicitaĂ§ĂŁo. No caso de ocorrer um timeout client side preencher com um cĂłdigo 408 [conforme documentaĂ§ĂŁo](https://openfinancebrasil.atlassian.net/wiki/spaces/OF/pages/37879861/Reporte)
          type: integer
          format: int32
          example: 200
          minimum: 200
          maximum: 599
        httpMethod:
          description: MĂ©todo HTTP da solicitaĂ§ĂŁo.
          type: string
          enum: ["GET", "POST", "PUT", "DELETE", "PATCH"]
          example: GET
        correlationId:
          description: NĂŁo utilizado pelo server.
          type: string
          pattern: ^[- /:_.',0-9a-zA-Z]{0,100}$
          maxLength: 100
          example: "uGQHwNupARo7I9E2PLJZph18a0M9y7DcUe7ITt3DqUOJd9NVjnskxf2"
        timestamp:
          description: Data/Hora UTC no formato ISO8601 com milissegundos (YYYY-MM-DDTHH:mm:ss.sssZ) do momento em que a chamada foi recebida, imediatamente antes do primeiro byte enviado na requisiĂ§ĂŁo.
          type: string
          format: date-time
          maxLength: 28
          example: "2021-11-11T18:08:08.152Z"
        processTimespan:
          description: Tempo em milissegundos inteiros decorrido desde o registro do timestamp atĂ© a finalizaĂ§ĂŁo do envio dos dados.
          type: integer
          format: int16
          example: 120
        clientOrgId:
          description: Identificador da organizaĂ§ĂŁo **de onde** a chamada foi disparada
          type: string
          format: uuid
          maxLength: 36
          pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"
          example: "56411f7e-d58b-44a8-8a2b-ff326d3f2955"
        serverOrgId:
          description: Identificador da organizaĂ§ĂŁo **para onde** a chamada foi feita. A PCM garante que foi esta orgId que obteve o token de acesso utilizado neste reporte.
          type: string
          format: uuid
          maxLength: 36
          pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"
          example: "c1ca8e62-9d6f-4ea3-84f2-d66bc0a8f7dc"
        additionalInfo:
          description: InformaĂ§Ă”es adicionais sobre o reporte deste endpoint/mĂ©todo. Possui caracterĂ­stica variĂĄvel. As regras de preenchimento estĂŁo na documentaĂ§ĂŁo funcional em [openfinancebrasil](https://openfinancebrasil.atlassian.net/wiki/spaces/OF/pages/806158355/Planilha+AdditionalInfo). AtenĂ§ĂŁo especial na tabela Excel com a listagem de endpoints em [https://openfinancebrasil.atlassian.net/wiki/spaces/OF/pages/806158355/Planilha+AdditionalInfo](https://openfinancebrasil.atlassian.net/wiki/spaces/OF/pages/806158355/Planilha+AdditionalInfo)
          type: object
          properties:
            dropReason:
              description: |
                1. O campo dropReason deve ser adicionado nas informaĂ§Ă”es do campo additionalInfo que deverĂĄ ser enviado no reporte do provedor do serviĂ§o consumido (papel SERVER)
                2. O campo deve ser preenchido como âNO_CREDENTIAL" caso o CPF/CNPJ nĂŁo seja cliente ou âNONEâ caso contrĂĄrio.
                3. Neste contexto define-se como cliente o CPF/CNPJ que possui credencial autenticadora para prosseguir no fluxo monitorado.
                4. O reporte deverĂĄ ser feito por todos os transmissores de dados e detentoras de conta.
                5. Para o caso em que o operador nĂŁo possui poder, apĂłs autenticaĂ§ĂŁo dele e desambiguaĂ§ĂŁo de quem estĂĄ operando, o reporte deve ser realizado com "NO_CREDENTIAL".

                 Diretrizes:
                - `NONE`: quando o CPF (loggedUser) / CNPJ (businessEntity) possui credencial autenticadora e poderes suficientes para prosseguir o fluxo monitorado - exemplo: PF, cliente, que possui credencial ativa, mas nĂŁo se autenticou; cliente que se autenticou utilizando a credencial correta.
                - `NO_CREDENTIAL`: quando o CPF (loggedUser) / CNPJ (businessEntity) nĂŁo for cliente ou nĂŁo possuir credencial vĂĄlida/ativa para prosseguir no fluxo monitorado.
                - `NO_AUTHORITY`: quando o CPF (loggedUser) / CNPJ (businessEntity) consegue se autenticar, mas nĂŁo dispĂ”e de poderes ou alĂ§adas para prosseguir no fluxo de compartilhamento de dados e serviĂ§os.
                - `NO_AUTHORITY_PERSON_MISMATCH`: quando o CPF (loggedUser) nĂŁo possui relaĂ§ĂŁo com a credencial utilizada na etapa de autenticaĂ§ĂŁo do Hybrid Flow - exemplo: consentimento criado para um CPF e autenticado por outro; criado para um CNPJ e autenticado por CPF sem relaĂ§ĂŁo com o CNPJ.

                Regras:
                  - O reporte deverĂĄ ser feito por todos os transmissores de dados e detentoras de conta.

                    Para os casos em que ocorram falhas tĂ©cnicas que impossibilitem a verificaĂ§ĂŁo do CPF/CNPJ (incluindo, mas nĂŁo se limitando, a erros HTTP 4xx, 500 ou timeout na resposta), o reporte deve ser realizado com o valor NO_CREDENTIAL,

                  Em jornadas de mĂșltipla alĂ§ada de pessoas jurĂ­dicas, quando a autenticaĂ§ĂŁo Ă© bem-sucedida mas os poderes constituĂ­dos sĂŁo insuficientes para finalizaĂ§ĂŁo do Hybrid Flow, deve-se usar NO_AUTHORITY.

                Escopo:
                  - Verificar regras de preenchimento do campo dropReason de acordo com as definiĂ§Ă”es das PAR-128
                  - Atualizar a documentaĂ§ĂŁo do swagger nos produtos e endpoints onde o campo dropReason Ă© obrigatĂłrio
                  - Realizar a ingestĂŁo na PCM das informaĂ§Ă”es enviadas no campo dropReason
              type: string
        role:
          description: ENUM indicando se o reporte que estĂĄ sendo enviado apresenta a visĂŁo do server ou do client. ObrigatĂłrio valor "SERVER"
          type: string
          enum:
            - CLIENT
            - SERVER

