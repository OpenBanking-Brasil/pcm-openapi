        originalContractCET:
          description: |
            âą	CET â Custo Efetivo Total deve ser expresso na forma de taxa percentual anual e incorpora todos os encargos e despesas incidentes nas operaĂ§Ă”es de crĂ©dito (taxa de juro, mas tambĂ©m tarifas, tributos, seguros e outras despesas cobradas). 
            O preenchimento deve respeitar as 6 casas decimais, mesmo que venham preenchidas com zeros (representaĂ§ĂŁo de porcentagem p.ex: 0.150000. 
            Este valor representa 15%. O valor 1 representa 100%). 
            Para o pĂșblico PF (pessoa fĂ­sica) o campo Ă© de envio obrigatĂłrio para contratos firmados a partir de 2008, conforme ResoluĂ§ĂŁo CMN 3.517. 
            Para o pĂșblico PJ (pessoa jurĂ­dica) o campo Ă© de envio obrigatĂłrio para contratos firmados a partir de 2011, conforme ResoluĂ§ĂŁo CMN 3.909. 
            O campo poderĂĄ ser preenchido com 0.00 em cenĂĄrios nos quais a casa nĂŁo tenha a informaĂ§ĂŁo de CET (Custo efetivo total) apenas para as exceĂ§Ă”es listadas abaixo:

            - Em contratos anteriores a 2008 (para o pĂșblico PF) 
            - Em contratos anteriores a 2011 (para o pĂșblico PJ);
            - PĂșblico PJ de mĂ©dio ou grande porte.
          type: string
          minLength: 8
          maxLength: 13
          pattern: ^\d{1,6}\.\d{6}$
          example: "0.290000"
        originalPropositionCET:
          description: |
            âą	CET â Custo Efetivo Total deve ser expresso na forma de taxa percentual anual e incorpora todos os encargos e despesas incidentes nas operaĂ§Ă”es de crĂ©dito (taxa de juro, mas tambĂ©m tarifas, tributos, seguros e outras despesas cobradas). 
            O preenchimento deve respeitar as 6 casas decimais, mesmo que venham preenchidas com zeros (representaĂ§ĂŁo de porcentagem p.ex: 0.150000. 
            Este valor representa 15%. O valor 1 representa 100%). 
            Para o pĂșblico PF (pessoa fĂ­sica) o campo Ă© de envio obrigatĂłrio para contratos firmados a partir de 2008, conforme ResoluĂ§ĂŁo CMN 3.517. 
            Para o pĂșblico PJ (pessoa jurĂ­dica) o campo Ă© de envio obrigatĂłrio para contratos firmados a partir de 2011, conforme ResoluĂ§ĂŁo CMN 3.909. 
            O campo poderĂĄ ser preenchido com 0.00 em cenĂĄrios nos quais a casa nĂŁo tenha a informaĂ§ĂŁo de CET (Custo efetivo total) apenas para as exceĂ§Ă”es listadas abaixo:

            - Em contratos anteriores a 2008 (para o pĂșblico PF) 
            - Em contratos anteriores a 2011 (para o pĂșblico PJ);
            - PĂșblico PJ de mĂ©dio ou grande porte.
          type: string
          minLength: 8
          maxLength: 13
          pattern: ^\d{1,6}\.\d{6}$
          example: 0.290000
        originalContractTerm:
          description: Prazo restante do contrato original de emprĂ©stimo.
          type: number
          maximum: 999999
          example: 57
        propositionTerm:
          description: "Prazo da proposta de portabilidade de crĂ©dito"
          type: number
          maximum: 999999999
          example: 30
        creditPortabilityStatus: 
          description: |
            InformaĂ§ĂŁo sobre o status de um pedido de portabilidade de crĂ©dito, onde:
            - `RECEIVED`: Estado inicial. Indica que o pedido de portabilidade foi solicitado junto Ă  instituiĂ§ĂŁo credora. O pedido deve permanecer neste estado atĂ© o prĂłximo dia Ăștil (D+1) onde comeĂ§arĂĄ a contar o prazo de 3 dias Ășteis para a etapa de contraproposta e o pedido de portabilidade deverĂĄ ser movido para PENDING 
            - `PENDING`: Indica que o pedido de portabilidade de crĂ©dito estĂĄ na fase de contraproposta, onde a instituiĂ§ĂŁo credora poderĂĄ enviar uma contraproposta ou nĂŁo para o cliente por qualquer canal (email, telefone, etc.) porĂ©m o aceite sĂł deverĂĄ ser valido se o cliente aprovar no canal digital da instituiĂ§ĂŁo credora
            - `ACCEPTED_SETTLEMENT_IN_PROCESS`: Indica que a contraproposta nĂŁo foi aceita pelo cliente e a instituiĂ§ĂŁo proponente terĂĄ que quitar o valor do contrato no mesmo dia em que o estado foi ativado.
            - `ACCEPTED_SETTLEMENT_COMPLETED`: Indica que a instituiĂ§ĂŁo proponente jĂĄ liquidou o contrato e comunicou a respeito Ă  credora que estĂĄ validando os dados do contrato bem como valores recebidos para a quitaĂ§ĂŁo do mesmo (nesta etapa a instituiĂ§ĂŁo credora tem 2 dias Ășteis para fornecer a confirmaĂ§ĂŁo e o recibo de quitaĂ§ĂŁo do contrato de emprĂ©stimo)
            - `PORTABILITY_COMPLETED`: Indica que o pedido de portabilidade foi concluĂ­do com sucesso REJECTED: Indica que o pedido de portabilidade de crĂ©dito foi rejeitado, seja porque o cliente aceitou a contraproposta, ou porque a proponente rejeitou a liquidaĂ§ĂŁo que excedeu em 15% o valor do contrato original, entre outras possibilidades
            - `CANCELLED`: Indica que o cliente cancelou o pedido de portabilidade de crĂ©dito 
            - `PAYMENT_ISSUE`: Indica que a InstituiĂ§ĂŁo Credora encontrou alguma inconsistĂȘncia na liquidaĂ§ĂŁo efetuada e que a InstituiĂ§ĂŁo Proponente deverĂĄ realizar ajustes conforme sugerido pela InstituiĂ§ĂŁo Credora para solucionar a pendĂȘncia antes do cancelamento do pedido de portabilidade de crĂ©dito
          type: string
          enum:
            - PENDING 
            - RECEIVED 
            - ACCEPTED_SETTLEMENT_IN_PROCESS
            - ACCEPTED_SETTLEMENT_COMPLETED
            - PORTABILITY_COMPLETED
            - REJECTED
            - CANCELLED
        statusUpdateDateTime:
          description: "âą	Data e hora em que o contrato teve o status atualizado. Uma string com data e hora conforme especificaĂ§ĂŁo ISO-8601, sempre com a utilizaĂ§ĂŁo de timezone UTC(UTC time format)."
