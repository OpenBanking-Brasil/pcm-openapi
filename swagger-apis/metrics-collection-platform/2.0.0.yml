        fapiInteractionId:
          description: |
            UUID que identifica uma transaĂ§ĂŁo especĂ­fica entre dois participantes. Esse dado pode ser encontrado no header x-fapi-interaction-id informado pelo Client e devolvido pelo Server. Mais informaĂ§Ă”es em CabeĂ§alhos HTTP na documentaĂ§ĂŁo do Open Finance Brasil. O envio dessa informaĂ§ĂŁo Ă© obrigatĂłrio, exceto nos casos ontem ela nĂŁo esteja disponĂ­vel como, por exemplo, em respostas com status 5xx, ou em chamadas que terminaram por timeout onde o reporte tem que ser enviado, mas sem esse atributo. Nos demais cenĂĄrios, o envio Ă© obrigatĂłrio.
