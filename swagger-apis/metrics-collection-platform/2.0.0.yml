    ReportStatus:
      description: |
        Informa o status do registro de reporte.
        * **DISCARDED**: O status `DISCARDED` indica que o reporte enviado pelo participante foi rejeitado pela PCM. O motivo do descarte serĂĄ enviado com a resposta, podendo ser por conta de um reporte invĂĄlido ou por um erro no processamento. NĂŁo Ă© possĂ­vel modificar um reporte `DISCARDED`, portanto o reportador deverĂĄ corrigir o registro que apresentou erro e reenviar via POST.
        * **SINGLE**: O status `SINGLE` indica que o reporte em questĂŁo nĂŁo tem uma contraparte. Ele Ă© utilizado em casos onde a conciliaĂ§ĂŁo entre dois reportes nĂŁo Ă© possĂ­vel.
        * **ACCEPTED**: O status `ACCEPTED` indica que a validaĂ§ĂŁo de formato do reporte nĂŁo tem erros e este serĂĄ enviado para processamento.
        * **UNPAIRED**: O status `UNPAIRED` significa que o reporte atual nĂŁo possui uma correspondĂȘncia em outro reporte atravĂ©s do atributo `fapiInteractionId`. Indica um reporte _divergente_.
        * **PAIRED_INCONSISTENT**: O status `PAIRED_INCONSISTENT` significa que o reporte corrente possui uma contraparte com o mesmo `fapiInteractionId`, mas os demais dados estĂŁo inconsistentes. Indica um reporte _divergente_.
        * **PAIRED**: Indica que o reporte tem uma contraparte com o mesmo `fapiInteractionId` e os demais dados estĂŁo conciliados. Representa o estado final desejado em um fluxo correto.
      type: string
      enum:
        - DISCARDED
        - SINGLE
        - ACCEPTED
        - UNPAIRED
        - PAIRED_INCONSISTENT
        - PAIRED

