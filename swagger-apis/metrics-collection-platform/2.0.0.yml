components:
  schemas:
    Platform:
      type: string
      enum:
        - BROWSER
        - APP
      example: BROWSER

    URI:
      type: string
      format: uri
      pattern:  ^[- /:_.',0-9a-zA-Z]{0,200}$
      maxLength: 2000
      example: https://api.banco.com.br/open-banking/api/v1/resource

    Timestamp:
      description: Data/Hora UTC no formato ISO8601 com milissegundos (YYYY-MM-DDTHH:mm:ss.sssZ) do momento em que a chamada foi disparada, imediatamente antes do primeiro byte enviado na requisiĂ§ĂŁo.
      type: string
      format: date-time
      maxLength: 28
      example: "2021-11-11T18:08:08.278Z"

    ConsentId:
      type: string
      pattern: ^urn:[a-zA-Z0-9][a-zA-Z0-9\-]{0,31}:[a-zA-Z0-9()+,\-.:=@;$_!*''%\/?#]+$
      maxLength: 256
      example: urn:bancoex:C1DD33123
      description: |

        O consentId deve ser preenchido com a mesma string do identificador Ășnico de um fluxo de consentimento de dados, de pagamento ou de vĂ­nculo

        exemplos:    
        
          * pĂłs `POST` /open-banking/payments/v4/consents utilizar a string obtida/enviada em data.consentId
        
          * pĂłs `POST` /open-banking/consents/v3/consents utilizar a string obtida/enviada em data.consentId
        
          * pĂłs `POST` /automatic-payments/v1/recurring-consents utilizar a string obtida/enviada em data.recurringConsentId
        
          * pĂłs `POST` /automatic-payments/v1/pix/recurring-payments utilizar a string obtida/enviada em data.recurringConsentId
        
          * pĂłs `POST` /open-banking/enrollments/v1/enrollments utilizar a string obtida/enviada em data.enrollmentId

    OSType:
      type: string
      example: LINUX
      enum:
        - LINUX
        - MACOS
        - UNIX
        - WINDOWS
        - IOS
        - ANDROID
        - OTHER

