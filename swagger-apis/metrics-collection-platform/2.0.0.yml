    AdditionalInfo:
      description: InformaĂ§Ă”es adicionais sobre o reporte deste endpoint/mĂ©todo. Possui caracterĂ­stica variĂĄvel. As regras de preenchimento estĂŁo na documentaĂ§ĂŁo funcional em [https://openfinancebrasil.atlassian.net/wiki/spaces/OF/pages/806158355/Planilha+AdditionalInfo](https://openfinancebrasil.atlassian.net/wiki/spaces/OF/pages/806158355/Planilha+AdditionalInfo). AtenĂ§ĂŁo especial na tabela Excel com a listagem de endpoints em [https://openfinancebrasil.atlassian.net/wiki/spaces/OF/pages/806158355/Planilha+AdditionalInfo](https://openfinancebrasil.atlassian.net/wiki/spaces/OF/pages/806158355/Planilha+AdditionalInfo).
      type: object

      properties:
        consentId:
          description: Deve ser preenchido com a mesma string obtida no campo `.data.consentId` retornado apĂłs a chamada inicial na API "POST /consent". *Ao reportar o uso de um endpoint /token, o identificador Ășnico de consentimento sĂł serĂĄ reportado nos casos em que "grant_type" Ă© do tipo "authorization_code" ou do tipo "refresh_token", uma vez que esta informaĂ§ĂŁo de consentId Ă© inexistente quando "grant_type" Ă© do tipo
          type: string
        personType:
          description: Deve ser preenchida baseado no tipo de pessoa responsĂĄvel pelo consentimento. DeverĂĄ ser obserdado se `.data.businessEntity` estiver preenchido no payload, se estiver entĂŁo preencher com "PJ", se nĂŁo estiver entĂŁo preencher com "PF"
          type: string
