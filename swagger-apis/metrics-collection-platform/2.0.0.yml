            - POLITICA_DE_CREDITO
            - RETENCAO_DO_CLIENTE
            - CONTRATO_JA_LIQUIDADO
            - DIVERGENCIA_DE_PAGAMENTO_EFETUADO
            - DECURSO_DO_PRAZO_PARA_PAGAMENTO
            - PORTABILIDADE_CANCELADA_POR_FALTA_DE_LIQUIDACAO
            - PORTABILIDADE_EM_ANDAMENTO
            - CLIENTE_COM_ACAO_JUDICIAL
            - MODALIDADE_DA_OPERACAO_INCOMPATIVEL
            - OUTROS
        rejectedBy:
          description: |
            Informar usuĂĄrio responsĂĄvel pela rejeiĂ§ĂŁo da proposta, onde: PROPONENTE - Indica que o pedido de portabilidade de crĂ©dito foi rejeitado pela proponente, seja porque a proponente rejeitou a liquidaĂ§ĂŁo que excedeu em 15% o valor do contrato original, entre outras possibilidades. USUARIO - Indica que o cliente cancelou o pedido de portabilidade de crĂ©dito. CREDORA- Indica que a InstituiĂ§ĂŁo Credora cancelou o contrato por retenĂ§ĂŁo do cliente ou outros motivos conforme motivo de recusa.

              - SĂł serĂĄ preenchido caso o status seja REJECTED ou CANCELLED
